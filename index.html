<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leadership Continuity Lab | Burnout Prevention & Organizational Redesign</title>
  <meta name="description" content="Leadership Continuity Lab helps organizations protect leadership continuity by helping leaders redesign the conditions that create burnout, pressure, and operational drag." />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #162127;
      --muted: #607077;
      --card: #fffdf8;
      --line: #d9d2c7;
      --accent: #b46f43;
      --accent-dark: #79452c;
      --deep: #101b22;
      --deep-2: #1d2e35;
      --sage: #8fa99b;
      --clay: #c79a73;
      --shadow: rgba(16, 27, 34, 0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background:
        radial-gradient(circle at 12% 8%, rgba(143, 169, 155, 0.18), transparent 30%),
        radial-gradient(circle at 88% 4%, rgba(180, 111, 67, 0.12), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: Arial, sans-serif;
      line-height: 1.65;
    }

    a { color: inherit; text-decoration: none; }
    .site { overflow: hidden; }

    /* ── NAV ── */
    .nav-outer {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(244, 241, 234, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      transition: box-shadow 0.3s ease;
    }
    .nav-outer.scrolled { box-shadow: 0 4px 24px rgba(16,27,34,0.08); }

    .nav {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .brand {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.3rem;
      letter-spacing: -0.03em;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .nav-links a:not(.button):hover { color: var(--ink); transition: color 0.2s; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      border: none;
      background: none;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--line);
      padding: 0 24px;
      background: rgba(244, 241, 234, 0.97);
      backdrop-filter: blur(14px);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
    }
    .mobile-menu.open { max-height: 320px; padding: 16px 24px 24px; }
    .mobile-menu a {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 1rem;
    }
    .mobile-menu a:last-child { border-bottom: none; padding-top: 16px; }

    /* ── BUTTONS ── */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #fff;
      padding: 13px 22px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.92rem;
      line-height: 1;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 12px 28px rgba(121, 69, 44, 0.22);
      letter-spacing: 0.01em;
    }
    .button:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(121, 69, 44, 0.28);
    }
    .button:active { transform: translateY(0); }

    .button.ghost {
      background: transparent;
      color: var(--accent-dark);
      border: 1.5px solid var(--accent);
      box-shadow: none;
      padding: 12px 22px;
    }
    .button.ghost:hover { background: rgba(180,111,67,0.08); transform: translateY(-1px); }

    .button.secondary { background: transparent; color: var(--accent-dark); box-shadow: none; padding-left: 0; }
    .button.secondary:hover { transform: translateX(2px); background: transparent; box-shadow: none; }

    /* ── HERO ── */
    .hero {
      max-width: 1220px;
      margin: 0 auto;
      padding: 88px 24px 120px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(420px, 0.9fr);
      gap: 64px;
      align-items: center;
    }

    .eyebrow {
      color: var(--accent-dark);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      font-weight: 800;
      margin-bottom: 18px;
    }

    h1, h2, h3 {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 500;
      letter-spacing: -0.036em;
      color: var(--ink);
    }

    h1 {
      font-size: clamp(3rem, 5.8vw, 5.8rem);
      line-height: 1.02;
      max-width: 900px;
      margin-bottom: 28px;
    }

    h2 {
      font-size: clamp(2.1rem, 4vw, 4rem);
      line-height: 1.06;
      margin-bottom: 20px;
    }

    h3 { font-size: 1.35rem; line-height: 1.2; margin-bottom: 10px; }
    p { color: var(--muted); font-size: 1.04rem; max-width: 730px; }
    .hero p { font-size: 1.16rem; max-width: 660px; margin-bottom: 32px; }

    .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-bottom: 30px; }

    .trust-line {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      color: var(--muted);
      font-size: 0.97rem;
      max-width: 580px;
      line-height: 1.6;
    }

    .hero-visual {
      position: relative;
      min-height: 560px;
      border-radius: 42px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: 0 34px 90px var(--shadow);
      background:
        linear-gradient(145deg, rgba(16, 27, 34, 0.06), rgba(16, 27, 34, 0.38)),
        url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1400&q=80') center 42%/cover;
    }

    .visual-card {
      position: absolute;
      right: 28px;
      bottom: 28px;
      width: min(430px, calc(100% - 56px));
      background: rgba(255,253,248,0.94);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(217, 210, 199, 0.9);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 24px 60px rgba(16, 27, 34, 0.16);
    }

    .visual-card strong {
      display: block;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.35rem, 2.3vw, 1.9rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .visual-card span { color: var(--muted); font-size: 0.97rem; line-height: 1.55; }

    /* ── SECTIONS ── */
    .section { max-width: 1220px; margin: 0 auto; padding: 100px 24px; }
    .section-header { max-width: 875px; margin-bottom: 48px; }
    .section-header.center { margin-left: auto; margin-right: auto; text-align: center; }
    .section-header.center p { margin-left: auto; margin-right: auto; }

    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }

    /* ── CARDS ── */
    .card {
      background: rgba(255,253,248,0.82);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 30px;
      min-height: 220px;
      box-shadow: 0 16px 42px rgba(16, 27, 34, 0.06);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 28px 60px rgba(16, 27, 34, 0.11);
    }

    .card::after {
      content: '';
      position: absolute;
      right: -42px;
      top: -42px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(143, 169, 155, 0.16);
    }

    .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; position: relative; z-index: 1; }
    .icon-wrap {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(143,169,155,0.18); color: var(--accent-dark);
      display: grid; place-items: center; flex: 0 0 auto;
      transition: background 0.2s ease;
    }
    .card:hover .icon-wrap { background: rgba(180,111,67,0.16); }
    .icon-wrap i { width: 20px; height: 20px; stroke-width: 1.8; }
    .card p, .card ul, .card h3 { position: relative; z-index: 1; }
    .card ul, .dark-card ul, .outcomes-block ul { padding-left: 19px; margin-top: 12px; }
    li { color: var(--muted); margin-bottom: 9px; font-size: 1rem; }

    /* ── PROBLEM LIST ── */
    .problem-list {
      max-width: 850px;
      margin-top: 32px;
      display: grid;
      gap: 10px;
    }

    .problem-item {
      background: rgba(255,253,248,0.72);
      border: 1px solid var(--line);
      border-left: 3px solid rgba(180,111,67,0.4);
      border-radius: 16px;
      padding: 16px 20px;
      color: var(--muted);
      font-size: 1.02rem;
      transition: border-left-color 0.2s, transform 0.2s;
    }
    .problem-item:hover { border-left-color: var(--accent); transform: translateX(3px); }

    /* ── QUOTE BAND ── */
    .quote-band {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .quote-inner {
      background: var(--deep);
      border-radius: 36px;
      padding: 62px 64px;
      color: #fff;
      box-shadow: 0 28px 80px rgba(16,27,34,0.18);
      position: relative;
      overflow: hidden;
    }

    .quote-inner::before {
      content: '\201C';
      position: absolute;
      left: 52px;
      top: 24px;
      font-family: Georgia, serif;
      font-size: 8rem;
      line-height: 1;
      color: rgba(180,111,67,0.25);
    }

    .quote-inner::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      right: -120px;
      top: -120px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 0 0 46px rgba(180,111,67,0.12);
    }

    .quote-inner p {
      font-family: Georgia, 'Times New Roman', serif;
      color: #fff;
      font-size: clamp(1.9rem, 4vw, 3.7rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      max-width: 860px;
      position: relative;
      z-index: 1;
    }

    /* ── DARK BAND ── */
    .dark-band {
      background:
        linear-gradient(135deg, rgba(16,27,34,0.97), rgba(29,46,53,0.97)),
        url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=80') center/cover;
      color: #fff;
      margin: 60px 0;
      position: relative;
    }

    .dark-band::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 78% 22%, rgba(199,154,115,0.18), transparent 32%);
    }

    .dark-inner {
      max-width: 1220px;
      margin: 0 auto;
      padding: 100px 24px;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 56px;
      align-items: start;
      position: relative;
      z-index: 1;
    }

    .dark-band h2, .dark-band h3 { color: #fff; }
    .dark-band .eyebrow { color: var(--clay); }
    .dark-band p, .dark-band li { color: rgba(255,255,255,0.74); }
    .dark-band p + p { margin-top: 18px; }

    .dark-card {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      border-radius: 28px;
      padding: 36px;
      backdrop-filter: blur(12px);
    }
    .dark-card li { color: rgba(255,255,255,0.74); }

    /* ── PROGRAM ── */
    .program-visual {
      min-height: 340px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(145deg, rgba(16,27,34,0.12), rgba(16,27,34,0.6)),
        url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1400&q=80') center/cover;
      box-shadow: 0 24px 60px rgba(16, 27, 34, 0.12);
      position: relative;
      overflow: hidden;
    }

    .program-visual::after {
      content: 'structured support in real conditions';
      position: absolute;
      left: 28px;
      bottom: 28px;
      right: 28px;
      color: #fff;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2.1rem;
      line-height: 1.05;
      letter-spacing: -0.05em;
      max-width: 400px;
    }

    /* ── CYCLE ── */
    .cycle-wrap {
      background: rgba(255,253,248,0.72);
      border: 1px solid var(--line);
      border-radius: 36px;
      padding: 52px 34px 34px;
      box-shadow: 0 24px 70px rgba(16, 27, 34, 0.08);
      position: relative;
      overflow: hidden;
    }

    .cycle-wrap::before {
      content: 'Continuous Learning Cycles';
      position: absolute;
      right: 28px;
      top: 26px;
      color: var(--accent-dark);
      text-transform: uppercas
